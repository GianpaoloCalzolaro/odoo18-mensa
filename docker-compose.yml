services:
  odoo:
    image: ${ODOO_IMAGE}
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ODOO_ADMIN_PASSWD=${ODOO_ADMIN_PASSWD}
      - POSTGRES_DB=${POSTGRES_DB:-odoo}
      - POSTGRES_USER=${POSTGRES_USER:-odoo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-odoo}
    volumes:
      - odoo-data:/var/lib/odoo
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${PROJECT_NAME}.loadbalancer.server.port=8069"
      - "traefik.http.routers.${PROJECT_NAME}-ws.rule=Host(`${DOMAIN}`) && PathPrefix(`/websocket`)"
      - "traefik.http.routers.${PROJECT_NAME}-ws.entrypoints=websecure"
      - "traefik.http.services.${PROJECT_NAME}-ws.loadbalancer.server.port=8072"
    networks:
      - internal
      - dokploy-network
    restart: unless-stopped

  db:
    image: postgres:${POSTGRES_VERSION:-16}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-odoo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-odoo}
      - POSTGRES_USER=${POSTGRES_USER:-odoo}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-odoo} -d $${POSTGRES_DB:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    restart: unless-stopped

volumes:
  odoo-data:
    name: "${PROJECT_NAME}_odoo-data"
  db-data:
    name: "${PROJECT_NAME}_db-data"

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
